version: '3.9'
services:
  app:
    image: ${DOCKER_USERNAME}/${DOCKER_IMAGE_NAME}:latest # 사용할 이미지 이름
    build:
      context: . # Dockerfile이 위치한 디렉토리
      dockerfile: Dockerfile # 빌드에 사용할 Dockerfile
    ports:
      - "8080:8080" # 호스트와 컨테이너의 포트 매핑
    volumes:
      - ${FIREBASE_TOKEN_SEVER_PATH}:${FIREBASE_TOKEN_PATH}:ro
    environment:                                     
      KOREA_DATA_PORTAL: ${KOREA_DATA_PORTAL}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
      DATA_BASE_URL: ${DATA_BASE_URL}
      DATA_BASE_USERNAME: ${DATA_BASE_USERNAME}
      DATA_BASE_PASSWORD: ${DATA_BASE_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ODSAY: ${ODSAY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      RABBIT_PASSWORD: ${RABBIT_PASSWORD}
      FIREBASE_TOKEN_PATH: ${FIREBASE_TOKEN_PATH}
    networks:
      - sweepMap-network
    restart: always
    depends_on:
      - redis
      - rabbitmq

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    networks:
      - sweepMap-network
    restart: always

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"    # AMQP 프로토콜 (메시지 송수신)
      - "15672:15672"  # Management UI (웹 대시보드)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: ${RABBIT_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_logs:/var/log/rabbitmq
    networks:
      - sweepMap-network
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
  #debezium:
   # image: quay.io/debezium/server:2.7
    #container_name: debezium
    # ports: 제거 — 외부 노출 불필요
    #volumes:
    #  - ./conf:/debezium/conf
    #  - ./data:/debezium/data
    #depends_on:
     # rabbitmq:
      #  condition: service_healthy
    #networks:
     # - sweepMap-network
    #restart: always
volumes:
  rabbitmq_data:
    driver: local
  rabbitmq_logs:
    driver: local

networks:
  sweepMap-network:
    external: true
