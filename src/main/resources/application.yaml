spring:
  application:
    name: project
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update #create-drop
      database-platform: org.hibernate.dialect.PostgreSQLDialect #org.hibernate.dialect.H2Dialect #org.hibernate.dialect.MySQL8Dialect
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 100
        jdbc:
          exception-handling: ignore
  data:
    redis:
      host: localhost
      port: 6379
      password: test
  rabbitmq:
    host: localhost
    password: guest
    port: 5672
    username: guest
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: false
  security:
    oauth2:
      client:
        registration:
          naver:
            client-name: naver
            client-id: sdf
            client-secret: asdsd
            authorization-grant-type: authorization_code
            scope:
              - email
              - gender
              - birthday
              - birthyear
            redirect-uri: "{baseUrl}/{action}/oauth2/code/{registrationId}"
          google:
            client-name: google
            client-id: asdasd
            client-secret: asdad
            scope:
              - email
          kakao:
            client-name: kakao
            client-id: adsd
            client-secret: asasd
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - account_email
              - gender
              - birthday
              - birthyear
            redirect-uri: "{baseUrl}/{action}/oauth2/code/{registrationId}"
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-info-authentication-method: header
            user-name-attribute: id # Kakao 응답 값 id, connected_at, properties, kakao_accou

jwt:
  issuer: test
  secret-key: myverylongsecretkeythatisatleast32charsssss

discord:
  mq-url:

climate:
  api-key:
  api-url: https://apihub.kma.go.kr/api/typ02/openApi/VilageFcstInfoService_2.0/getVilageFcst

firebase:
  config-path: ./swpt.json
