<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>경로 탑승 정보 조회</title>
    <style>
        body { font-family: sans-serif; max-width: 860px; margin: 40px auto; padding: 0 20px; }
        .form-row { margin-bottom: 12px; display: flex; align-items: center; gap: 12px; }
        label { width: 140px; font-weight: bold; flex-shrink: 0; }
        select, input { padding: 6px 10px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 20px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        button:hover { background: #2563eb; }
        button:disabled { background: #93c5fd; cursor: not-allowed; }
        #result { margin-top: 24px; }
        .card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
        .card h3 { margin: 0 0 12px; color: #1e40af; }
        .info-row { display: flex; gap: 8px; margin-bottom: 6px; font-size: 14px; }
        .label { color: #64748b; width: 140px; flex-shrink: 0; }
        .value { font-weight: 600; }
        .train-item, .bus-item { background: white; border: 1px solid #e2e8f0; border-radius: 6px; padding: 10px 14px; margin-bottom: 8px; font-size: 13px; }
        .segment-item { padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 2px; }
        .segment-item.walk { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
        .segment-item.bus-seg { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }
        .segment-item.subway-seg { background: #faf5ff; border: 1px solid #e9d5ff; color: #6b21a8; }
        .seg-arrow { text-align: center; color: #94a3b8; font-size: 12px; margin: 2px 0; }
        .transfer-card { background: #fff7ed; border: 1px solid #fed7aa; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
        .transfer-card h4 { margin: 0 0 10px; color: #c2410c; font-size: 14px; }
        .transfer-badge { display: inline-block; background: #f97316; color: white; font-size: 11px; font-weight: bold; padding: 2px 8px; border-radius: 10px; margin-left: 8px; vertical-align: middle; }
        .error { color: #dc2626; padding: 12px; background: #fef2f2; border-radius: 6px; }
        .loading { color: #64748b; }
        .route-section-header { margin: 28px 0 12px; padding: 10px 16px; background: #1e40af; color: white; border-radius: 6px; font-size: 16px; font-weight: bold; }
        hr.section-divider { border: none; border-top: 2px dashed #e2e8f0; margin: 40px 0; }
        .bus-arrival-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
        .bus-arrival-card h3 { margin: 0 0 12px; color: #1e40af; }
        .coord-group { display: flex; gap: 8px; align-items: center; }
        .coord-group input { width: 160px; }
    </style>
</head>
<body>
    <h2>경로 탑승 정보 조회</h2>

    <div class="form-row">
        <label for="type">교통 수단</label>
        <select id="type">
            <option value="1">지하철</option>
            <option value="2">버스</option>
            <option value="0">복합 (버스+지하철)</option>
        </select>
    </div>

    <div class="form-row">
        <label>출발지 (위도, 경도)</label>
        <div class="coord-group">
            <input type="text" id="startLat" placeholder="위도 (예: 37.613)" value="37.6134436427887" />
            <input type="text" id="startLon" placeholder="경도 (예: 126.926)" value="126.926493082645" />
        </div>
    </div>

    <div class="form-row">
        <label>도착지 (위도, 경도)</label>
        <div class="coord-group">
            <input type="text" id="endLat" placeholder="위도 (예: 37.500)" value="37.5004198786564" />
            <input type="text" id="endLon" placeholder="경도 (예: 127.126)" value="127.126936754911" />
        </div>
    </div>

    <div class="form-row">
        <label for="arrivalTime">도착 희망 시각</label>
        <input type="datetime-local" id="arrivalTime" />
    </div>

    <div class="form-row">
        <button id="searchBtn" onclick="search()">조회</button>
    </div>

    <div id="result"></div>

    <hr class="section-divider">

    <h2>버스 도착 정보 조회 <span style="font-size:14px;color:#64748b;font-weight:normal;">(GET /route/bus/arrival)</span></h2>

    <div class="form-row">
        <label for="stId">stId / stationId</label>
        <input type="text" id="stId" placeholder="정류소 ID (예: 124000414)" style="width:220px;" />
    </div>
    <div class="form-row">
        <label for="busRouteId">busRouteId</label>
        <input type="text" id="busRouteId" placeholder="노선 ID (예: 100100578)" style="width:220px;" />
    </div>
    <div class="form-row">
        <label for="ord">ord / staOrder</label>
        <input type="number" id="ord" placeholder="정류소 순번 (예: 29)" value="0" style="width:100px;" />
    </div>
    <div class="form-row">
        <label for="providerCode">providerCode</label>
        <select id="providerCode">
            <option value="4">4 - 서울 BIS</option>
            <option value="2">2 - 경기 BIS</option>
        </select>
    </div>
    <div class="form-row">
        <button id="busArrivalBtn" onclick="fetchBusArrival()">조회</button>
    </div>

    <div id="busArrivalResult"></div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        const ODSAY_KEY   = /*[[${odsayKey}]]*/ '';

        const ODSAY_ROUTE_URL         = 'https://api.odsay.com/v1/api/searchPubTransPathT';
        const ODSAY_SCHEDULE_URL      = 'https://api.odsay.com/v1/api/searchSubwaySchedule';
        const ODSAY_PATH_SCHEDULE_URL = 'https://api.odsay.com/v1/api/subwayPathSchedule';
        const BUS_ARRIVAL_URL         = '/route/bus/arrival';
        const BOARDING_URL            = '/route/boarding';

        const TYPE_SUBWAY = 1;
        const TYPE_BUS    = 2;
        const TYPE_WALK   = 3;

        (function () {
            const now = new Date();
            now.setSeconds(0, 0);
            document.getElementById('arrivalTime').value = now.toISOString().slice(0, 16);
        })();

        function getCoords() {
            return {
                startLat: document.getElementById('startLat').value.trim(),
                startLon: document.getElementById('startLon').value.trim(),
                endLat:   document.getElementById('endLat').value.trim(),
                endLon:   document.getElementById('endLon').value.trim()
            };
        }

        // ── 시각 계산 유틸 ────────────────────────────────────────────
        function subtractMinutes(datetimeLocalStr, minutes) {
            const d = new Date(datetimeLocalStr);
            d.setMinutes(d.getMinutes() - minutes);
            return d;
        }

        function toHHMM(date) { return date.toTimeString().slice(0, 5); }

        function parseTimeToDate(hhmmss) {
            const today = new Date();
            const [h, m, s] = hhmmss.split(':').map(Number);
            today.setHours(h, m, s || 0, 0);
            return today;
        }

        // ── ODsay 경로 검색 ───────────────────────────────────────────
        async function callRouteApi(pathType) {
            const { startLat, startLon, endLat, endLon } = getCoords();
            // ODsay: SX/EX = 경도(longitude), SY/EY = 위도(latitude)
            const url = `${ODSAY_ROUTE_URL}?lang=0&apiKey=${ODSAY_KEY}&SX=${startLon}&SY=${startLat}&EX=${endLon}&EY=${endLat}&SearchPathType=${pathType}&output=json`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`ODsay 경로 API 오류: ${res.status}`);
            return res.json();
        }

        // ── 지하철 역별 시간표 (복합 경로용) ─────────────────────────
        async function callSubwaySchedule(stationID, wayCode) {
            const url = `${ODSAY_SCHEDULE_URL}?apiKey=${ODSAY_KEY}&stationID=${stationID}&wayCode=${wayCode}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`ODsay 시간표 API 오류: ${res.status}`);
            return res.json();
        }

        // ── 지하철 경로 시간표 (지하철 전용) ─────────────────────────
        async function callSubwayPathSchedule(sid, eid, dayCode, timeHHmm) {
            const url = `${ODSAY_PATH_SCHEDULE_URL}?apiKey=${ODSAY_KEY}&lang=0&SID=${sid}&EID=${eid}&MODE=2&DAY=${dayCode}&TIME=${timeHHmm}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`ODsay 경로 시간표 API 오류: ${res.status}`);
            return res.json();
        }

        // ── 버스 도착 정보 (백엔드 프록시) ───────────────────────────
        // providerCode: 4=서울 BIS(XML), 2=경기 BIS(JSON)
        // ord=0이면 백엔드에서 자동으로 정류소 순번을 조회한다
        async function callBusArrival(stId, busRouteId, ord, providerCode) {
            const pc = providerCode || 4;
            const url = `${BUS_ARRIVAL_URL}?stId=${encodeURIComponent(stId)}&busRouteId=${encodeURIComponent(busRouteId)}&ord=${ord || 0}&providerCode=${pc}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`버스 도착 API 오류: ${res.status}`);
            return res.json();
        }

        // BusArrivalInfo → 내부 버스 목록 형식으로 변환
        function parseBusArrivalInfo(data) {
            if (!data || !data.arrmsg1) return [];
            const result = [];
            function isValid(msg) {
                return msg && msg.trim() && !msg.includes('운행종료') && !msg.includes('출발대기') && !msg.includes('운행 정보 없음');
            }
            if (isValid(data.arrmsg1)) {
                result.push({ arrMsg: data.arrmsg1, remainSec: data.traTime1 || 0 });
            }
            if (isValid(data.arrmsg2)) {
                result.push({ arrMsg: data.arrmsg2, remainSec: data.traTime2 || 0 });
            }
            return result;
        }

        // ── 복합 경로 파싱 ────────────────────────────────────────────
        function parseMixedRoute(path) {
            const info = path.info;
            const segments = [];
            for (const sub of (path.subPath || [])) {
                if (sub.trafficType === TYPE_WALK) {
                    segments.push({ type: 'walk', distance: sub.distance, sectionTime: sub.sectionTime });
                } else if (sub.trafficType === TYPE_SUBWAY && sub.lane) {
                    const lane = sub.lane[0];
                    segments.push({
                        type: 'subway', lineName: lane.name, subwayCode: lane.subwayCode,
                        startStation: sub.startName, endStation: sub.endName,
                        stationCount: sub.stationCount, sectionTime: sub.sectionTime,
                        distance: sub.distance, startID: sub.startID, wayCode: sub.wayCode
                    });
                } else if (sub.trafficType === TYPE_BUS && sub.lane) {
                    const lane = sub.lane[0];
                    segments.push({
                        type: 'bus', busNo: lane.busNo, startStop: sub.startName, endStop: sub.endName,
                        stationCount: sub.stationCount, sectionTime: sub.sectionTime, distance: sub.distance,
                        localBusStationId: sub.startLocalStationID,
                        stationProviderCode: sub.startStationProviderCode || 4,
                        localBusId: lane.busLocalBlID,
                        busProviderCode: lane.busProviderCode || 4,
                        startStopOrder: sub.startExNo ?? 0
                    });
                }
            }
            return {
                totalTime: info.totalTime, payment: info.payment,
                transferCount: Math.max(0, (info.busTransitCount || 0) + (info.subwayTransitCount || 0) - 1),
                busTransitCount: info.busTransitCount, subwayTransitCount: info.subwayTransitCount,
                totalWalk: info.totalWalk, segments
            };
        }

        // ── 복합 경로 탑승 정보 계산 ─────────────────────────────────
        async function getMixedBoardingInfo(route, arrivalDatetime) {
            const segmentInfos = [];
            let elapsedTime = 0;
            let firstTransitFound = false;

            for (const seg of route.segments) {
                if (seg.type === 'walk') { elapsedTime += seg.sectionTime; continue; }

                const isTransfer = firstTransitFound;
                firstTransitFound = true;

                const remainingFromHere = route.totalTime - elapsedTime;
                const latestBoardingDate = subtractMinutes(arrivalDatetime, remainingFromHere);

                if (seg.type === 'subway') {
                    const scheduleData = await callSubwaySchedule(seg.startID, seg.wayCode);
                    const availableTrains = filterSubwayTrains(scheduleData, arrivalDatetime, seg.wayCode, latestBoardingDate, isTransfer);
                    segmentInfos.push({
                        type: 'subway', isTransfer,
                        stopOrStation: seg.startStation, transportId: seg.lineName,
                        pivotTime: toHHMM(latestBoardingDate), availableTrains
                    });
                } else if (seg.type === 'bus') {
                    const arrivalData = await callBusArrival(
                        seg.localBusStationId, seg.localBusId, seg.startStopOrder, seg.busProviderCode);
                    const arrivingBuses = parseBusArrivalInfo(arrivalData);
                    segmentInfos.push({
                        type: 'bus', isTransfer,
                        stopOrStation: seg.startStop, transportId: seg.busNo,
                        pivotTime: toHHMM(latestBoardingDate), arrivingBuses
                    });
                }
                elapsedTime += seg.sectionTime;
            }
            return segmentInfos;
        }

        // ── 지하철 경로 파싱 ──────────────────────────────────────────
        function parseSubwayRoute(path) {
            const info = path.info;
            const segments = [];
            for (const sub of (path.subPath || [])) {
                if (sub.trafficType === TYPE_WALK) {
                    segments.push({ type: 'walk', distance: sub.distance, sectionTime: sub.sectionTime });
                } else if (sub.trafficType === TYPE_SUBWAY && sub.lane) {
                    for (const lane of sub.lane) {
                        segments.push({
                            type: 'subway', lineName: lane.name, subwayCode: lane.subwayCode,
                            startStation: sub.startName, endStation: sub.endName,
                            stationCount: sub.stationCount, sectionTime: sub.sectionTime,
                            distance: sub.distance, startID: sub.startID, endID: sub.endID, wayCode: sub.wayCode
                        });
                    }
                }
            }
            return { totalTime: info.totalTime, payment: info.payment,
                transferCount: Math.max(0, (info.busTransitCount || 0) + (info.subwayTransitCount || 0) - 1), segments };
        }

        // ── 버스 경로 파싱 ────────────────────────────────────────────
        function parseBusRoute(path) {
            const info = path.info;
            const segments = [];
            for (const sub of (path.subPath || [])) {
                if (sub.trafficType === TYPE_WALK) {
                    segments.push({ type: 'walk', distance: sub.distance, sectionTime: sub.sectionTime });
                } else if (sub.trafficType === TYPE_BUS && sub.lane) {
                    for (const lane of sub.lane) {
                        segments.push({
                            type: 'bus', busNo: lane.busNo, busType: lane.type,
                            startStop: sub.startName, endStop: sub.endName,
                            stationCount: sub.stationCount, sectionTime: sub.sectionTime, distance: sub.distance,
                            busRouteId: lane.busID,
                            startStopId: sub.startID,
                            startStopOrder: 0, // ord는 백엔드 BIS API에서 자동 조회
                            localBusStationId: sub.startLocalStationID,
                            stationProviderCode: sub.startStationProviderCode || 4,
                            localBusId: lane.busLocalBlID,
                            busProviderCode: lane.busProviderCode || 4,
                            _rawSub: {
                                startExNo: sub.startExNo,
                                startID: sub.startID,
                                startLocalStationID: sub.startLocalStationID,
                                startArsID: sub.startArsID,
                                startStationProviderCode: sub.startStationProviderCode,
                                busLocalBlID: lane.busLocalBlID,
                                busProviderCode: lane.busProviderCode,
                                busID: lane.busID
                            }
                        });
                    }
                }
            }
            return { totalTime: info.totalTime, payment: info.payment,
                transferCount: Math.max(0, (info.busTransitCount || 0) + (info.subwayTransitCount || 0) - 1), segments };
        }

        // ── 지하철 탑승 정보 계산 (subwayPathSchedule) ────────────────
        async function getSubwayBoardingInfo(route, arrivalDatetime) {
            const subwaySegs = route.segments.filter(s => s.type === 'subway');
            if (!subwaySegs.length) throw new Error('지하철 구간이 없습니다.');

            const sid = subwaySegs[0].startID;
            const eid = subwaySegs[subwaySegs.length - 1].endID;
            const arrDate = new Date(arrivalDatetime);
            const dow = arrDate.getDay();
            const dayCode = dow === 6 ? 2 : dow === 0 ? 3 : 1;
            const timeHHmm = String(arrDate.getHours()).padStart(2, '0') + String(arrDate.getMinutes()).padStart(2, '0');

            const scheduleData = await callSubwayPathSchedule(sid, eid, dayCode, timeHHmm);
            const paths = scheduleData?.result?.path;
            if (!paths || !paths.length) {
                const err = new Error('지하철 경로 시간표 조회 실패 (SID=' + sid + ', EID=' + eid + ')');
                err.debugData = scheduleData;
                throw err;
            }

            const shortestPath = paths.find(p => p.pathType === 1) || paths[0];
            const MOVING_SUBWAY = 1;
            const fmtTime = t => t ? t.slice(0, 5) : null;

            const segmentInfos = [];
            let pendingWalkMinutes = 0, pendingPlatformArrival = null;
            let firstSubwayFound = false, segIdx = 0;

            for (const subPath of (shortestPath.subPath || [])) {
                if (subPath.movingType === 2) {
                    pendingWalkMinutes = subPath.sectionTime || 0;
                    pendingPlatformArrival = fmtTime(subPath.arrivalTime);
                    continue;
                }
                if (subPath.movingType !== MOVING_SUBWAY) continue;

                const isTransfer = firstSubwayFound;
                firstSubwayFound = true;
                segmentInfos.push({
                    isTransfer,
                    startStation: subPath.startName || '',
                    lineName: subPath.laneName || (segIdx < subwaySegs.length ? subwaySegs[segIdx].lineName : ''),
                    latestBoardingTime: fmtTime(subPath.departureTime),
                    trainArrivalTime: isTransfer ? pendingPlatformArrival : null,
                    transferWalkMinutes: pendingWalkMinutes
                });
                pendingWalkMinutes = 0; pendingPlatformArrival = null; segIdx++;
            }

            if (!segmentInfos.length) {
                const err = new Error('스케줄 응답에서 지하철 구간을 파싱할 수 없습니다.');
                err.debugData = scheduleData;
                throw err;
            }

            const recommendedDepartTime = shortestPath.info?.departureTime
                ? fmtTime(shortestPath.info.departureTime)
                : (segmentInfos[0].latestBoardingTime || toHHMM(subtractMinutes(arrivalDatetime, route.totalTime)));

            return { recommendedDepartTime, segmentInfos };
        }

        function filterSubwayTrains(scheduleData, arrivalDatetime, wayCode, pivotDate, isTransfer) {
            const result = scheduleData && scheduleData.result;
            if (!result) return [];
            const dow = new Date(arrivalDatetime).getDay();
            let weekSchedule = dow === 6 ? (result.토요일 || result.saturdaySchedule)
                             : dow === 0 ? (result.일요일 || result.sundaySchedule || result.holidaySchedule)
                             : (result.평일 || result.weekdaySchedule);
            if (!weekSchedule) return [];
            const trains = wayCode === 1 ? (weekSchedule.up || weekSchedule.상행 || [])
                                         : (weekSchedule.down || weekSchedule.하행 || []);
            const pivotMs = pivotDate.getTime();
            const mapped = trains.filter(t => t.departureTime).map(t => ({
                departureTime: t.departureTime, endStation: t.endStationName,
                subwayClass: t.subwayClass, firstLastFlag: t.firstLastFlag,
                _ms: parseTimeToDate(t.departureTime).getTime()
            }));
            if (isTransfer) {
                return mapped.filter(t => t._ms >= pivotMs).sort((a, b) => a._ms - b._ms).slice(0, 3);
            } else {
                return mapped.filter(t => t._ms <= pivotMs).sort((a, b) => b._ms - a._ms).slice(0, 3).sort((a, b) => a._ms - b._ms);
            }
        }

        // ── 버스 탑승 정보 계산 ───────────────────────────────────────
        async function getBusBoardingInfo(route, arrivalDatetime) {
            const segmentInfos = [];
            let elapsedTime = 0, firstFound = false;

            for (const seg of route.segments) {
                if (seg.type === 'walk') { elapsedTime += seg.sectionTime; continue; }
                if (seg.type !== 'bus') continue;

                const isTransfer = firstFound;
                firstFound = true;

                const pivotDate   = subtractMinutes(arrivalDatetime, route.totalTime - elapsedTime);
                const arrivalData = await callBusArrival(
                    seg.localBusStationId, seg.localBusId, seg.startStopOrder, seg.busProviderCode);
                const arrivingBuses = parseBusArrivalInfo(arrivalData);

                segmentInfos.push({
                    isTransfer, startStop: seg.startStop, busNo: seg.busNo,
                    pivotTime: toHHMM(pivotDate), arrivingBuses,
                    _stationId:    seg.localBusStationId,
                    _busId:        seg.localBusId,
                    _ord:          seg.startStopOrder,
                    _providerCode: seg.busProviderCode,
                    _rawSub:       seg._rawSub
                });
                elapsedTime += seg.sectionTime;
            }

            if (!segmentInfos.length) throw new Error('버스 구간이 없습니다.');
            return {
                recommendedDepartTime: toHHMM(subtractMinutes(arrivalDatetime, route.totalTime)),
                segmentInfos
            };
        }


        // ── 렌더링: 공통 유틸 ─────────────────────────────────────────
        function formatRemainTime(sec) {
            if (!sec || sec <= 0) return '-';
            const m = Math.floor(sec / 60), s = sec % 60;
            if (m === 0) return `${s}초 후`;
            if (s === 0) return `${m}분 후`;
            return `${m}분 ${s}초 후`;
        }

        function busItemHtml(bus, idx) {
            return `
                <div class="bus-item">
                    <strong>${idx}번째 버스</strong>
                    <div class="info-row" style="margin-top:6px;">
                        <span class="label">도착 예정</span>
                        <span class="value" style="color:#2563eb;">${formatRemainTime(bus.remainSec)}</span>
                    </div>
                    <div class="info-row"><span class="label">도착 메시지</span><span class="value">${bus.arrMsg || '-'}</span></div>
                </div>`;
        }

        // ── 렌더링: 지하철 ────────────────────────────────────────────
        function renderSubway(route, info) {
            const summaryCard = `
                <div class="card">
                    <h3>지하철 경로 요약</h3>
                    <div class="info-row"><span class="label">권장 출발 시각</span><span class="value">${info.recommendedDepartTime || '-'}</span></div>
                    <div class="info-row"><span class="label">총 소요 시간</span><span class="value">${route.totalTime}분</span></div>
                    <div class="info-row"><span class="label">환승 횟수</span><span class="value">${route.transferCount}회</span></div>
                    <div class="info-row"><span class="label">요금</span><span class="value">${route.payment.toLocaleString()}원</span></div>
                </div>`;

            const segmentsHtml = route.segments.map(seg =>
                seg.type === 'walk'
                    ? `<div class="segment-item walk">🚶 도보 <strong>${(seg.distance / 1000).toFixed(2)} km</strong> 약 <strong>${seg.sectionTime}분</strong></div>`
                    : `<div class="segment-item subway-seg">🚇 <strong>${seg.lineName}</strong> ${seg.startStation} → ${seg.endStation} (<strong>${seg.stationCount}역</strong>, 약 ${seg.sectionTime}분)</div>`
            ).join('<div class="seg-arrow">↓</div>');

            const segCardsHtml = info.segmentInfos.map(seg => {
                const headerLabel = seg.isTransfer ? `환승 탑승 정보 <span class="transfer-badge">환승</span>` : `첫 번째 탑승 정보`;
                return `
                    <div class="card">
                        <h3>🚇 ${headerLabel}</h3>
                        <div class="info-row"><span class="label">탑승역</span><span class="value">${seg.startStation}</span></div>
                        <div class="info-row"><span class="label">노선</span><span class="value">${seg.lineName}</span></div>
                        ${seg.isTransfer && seg.transferWalkMinutes ? `<div class="info-row"><span class="label">환승 이동 시간</span><span class="value">${seg.transferWalkMinutes}분 도보</span></div>` : ''}
                        ${seg.isTransfer && seg.trainArrivalTime ? `<div class="info-row"><span class="label">환승 플랫폼 도착</span><span class="value" style="color:#16a34a;">${seg.trainArrivalTime}</span></div>` : ''}
                        <div class="info-row">
                            <span class="label">${seg.isTransfer ? '환승 열차 출발' : '탑승 시각'}</span>
                            <span class="value" style="color:#1d4ed8;font-size:15px;font-weight:700;">${seg.latestBoardingTime || '-'}</span>
                        </div>
                    </div>`;
            }).join('');

            return summaryCard + `<div class="card"><h3>경로 구성</h3>${segmentsHtml}</div>` + segCardsHtml;
        }

        // ── 렌더링: 버스 ─────────────────────────────────────────────
        function renderBus(route, info) {
            const segmentsHtml = route.segments.map(seg =>
                seg.type === 'walk'
                    ? `<div class="segment-item walk">🚶 도보 <strong>${(seg.distance / 1000).toFixed(2)} km</strong> 약 <strong>${seg.sectionTime}분</strong></div>`
                    : `<div class="segment-item bus-seg">🚌 <strong>${seg.busNo}번</strong> ${seg.startStop} → ${seg.endStop} (<strong>${seg.stationCount}정거장</strong>, 약 ${seg.sectionTime}분)</div>`
            ).join('<div class="seg-arrow">↓</div>');

            const boardingCardsHtml = info.segmentInfos.map(seg => {
                const headerLabel = seg.isTransfer ? `환승 탑승 정보 <span class="transfer-badge">환승</span>` : `첫 번째 탑승 정보`;
                const buses = seg.arrivingBuses || [];
                const busesHtml = buses.length
                    ? buses.map((b, i) => busItemHtml(b, i + 1)).join('')
                    : '<p style="color:#64748b;font-size:13px;">도착 예정 버스 정보가 없습니다.</p>';
                return `
                    <div class="card">
                        <h3>🚌 ${headerLabel}</h3>
                        <div class="info-row"><span class="label">탑승 정류장</span><span class="value">${seg.startStop}</span></div>
                        <div class="info-row"><span class="label">버스 번호</span><span class="value">${seg.busNo}번</span></div>
                        <div class="info-row"><span class="label">정류소 순번(ord)</span><span class="value" style="color:#64748b;">${seg._ord ?? '-'}</span></div>
                        <details style="margin:6px 0 0;font-size:12px;">
                            <summary style="cursor:pointer;color:#64748b;">ODsay 파싱 원본 보기</summary>
                            <pre style="background:#f1f5f9;border:1px solid #e2e8f0;border-radius:4px;padding:8px;margin-top:4px;overflow-x:auto;">${JSON.stringify(seg._rawSub, null, 2)}</pre>
                        </details>
                        <div class="info-row">
                            <span class="label">${seg.isTransfer ? '환승 도착 예정' : '최대 탑승 시각'}</span>
                            <span class="value">${seg.pivotTime}</span>
                        </div>
                        <div style="margin-top:10px;"><strong style="font-size:13px;">도착 예정 버스</strong></div>
                        <div style="margin-top:8px;">${busesHtml}</div>
                    </div>`;
            }).join('');

            return `
                <div class="card">
                    <h3>버스 경로 요약</h3>
                    <div class="info-row"><span class="label">권장 출발 시각</span><span class="value">${info.recommendedDepartTime}</span></div>
                    <div class="info-row"><span class="label">총 소요 시간</span><span class="value">${route.totalTime}분</span></div>
                    <div class="info-row"><span class="label">환승 횟수</span><span class="value">${route.transferCount}회</span></div>
                    <div class="info-row"><span class="label">요금</span><span class="value">${route.payment.toLocaleString()}원</span></div>
                </div>
                <div class="card"><h3>경로 구성</h3>${segmentsHtml}</div>
                ${boardingCardsHtml}`;
        }

        // ── 렌더링: 복합 경로 ─────────────────────────────────────────
        function renderMixed(route, segmentInfos, arrivalDatetime) {
            const recommendedDepart = toHHMM(subtractMinutes(arrivalDatetime, route.totalTime));

            const segmentsHtml = route.segments.map(seg => {
                if (seg.type === 'walk') return `<div class="segment-item walk">🚶 도보 <strong>${(seg.distance / 1000).toFixed(2)} km</strong> 약 <strong>${seg.sectionTime}분</strong></div>`;
                if (seg.type === 'subway') return `<div class="segment-item subway-seg">🚇 <strong>${seg.lineName}</strong> ${seg.startStation} → ${seg.endStation} (<strong>${seg.stationCount}역</strong>, 약 ${seg.sectionTime}분)</div>`;
                if (seg.type === 'bus') return `<div class="segment-item bus-seg">🚌 <strong>${seg.busNo}번</strong> ${seg.startStop} → ${seg.endStop} (<strong>${seg.stationCount}정거장</strong>, 약 ${seg.sectionTime}분)</div>`;
                return '';
            }).join('<div class="seg-arrow">↓</div>');

            const boardingCardsHtml = segmentInfos.map(info => {
                const headerLabel = info.isTransfer ? `환승 탑승 정보 <span class="transfer-badge">환승</span>` : `첫 번째 탑승 정보`;

                if (info.type === 'subway') {
                    const trains = info.availableTrains || [];
                    const trainsHtml = trains.length
                        ? trains.map(t => `
                            <div class="train-item">
                                출발 <strong>${t.departureTime.slice(0, 5)}</strong> → 종착 <strong>${t.endStation || '-'}</strong>
                                ${t.subwayClass ? `(${t.subwayClass})` : ''}
                            </div>`).join('')
                        : '<p style="color:#64748b;font-size:13px;">이용 가능한 열차가 없습니다.</p>';
                    return `
                        <div class="card">
                            <h3>🚇 ${headerLabel}</h3>
                            <div class="info-row"><span class="label">탑승역</span><span class="value">${info.stopOrStation}</span></div>
                            <div class="info-row"><span class="label">노선</span><span class="value">${info.transportId}</span></div>
                            <div class="info-row"><span class="label">${info.isTransfer ? '환승역 도착 예정' : '최대 탑승 시각'}</span><span class="value">${info.pivotTime}</span></div>
                            <div style="margin-top:10px;"><strong style="font-size:13px;">${info.isTransfer ? '도착 이후 열차' : '이용 가능한 열차 (마감 직전 3편)'}</strong></div>
                            <div style="margin-top:8px;">${trainsHtml}</div>
                        </div>`;
                } else {
                    const buses = info.arrivingBuses || [];
                    const busesHtml = buses.length
                        ? buses.map((b, i) => busItemHtml(b, i + 1)).join('')
                        : '<p style="color:#64748b;font-size:13px;">도착 예정 버스 정보가 없습니다.</p>';
                    return `
                        <div class="card">
                            <h3>🚌 ${headerLabel}</h3>
                            <div class="info-row"><span class="label">탑승 정류장</span><span class="value">${info.stopOrStation}</span></div>
                            <div class="info-row"><span class="label">버스 번호</span><span class="value">${info.transportId}번</span></div>
                            <div class="info-row"><span class="label">${info.isTransfer ? '환승 도착 예정' : '최대 탑승 시각'}</span><span class="value">${info.pivotTime}</span></div>
                            <div style="margin-top:10px;"><strong style="font-size:13px;">도착 예정 버스</strong></div>
                            <div style="margin-top:8px;">${busesHtml}</div>
                        </div>`;
                }
            }).join('');

            return `
                <div class="card">
                    <h3>복합 경로 요약</h3>
                    <div class="info-row"><span class="label">총 소요 시간</span><span class="value">${route.totalTime}분</span></div>
                    <div class="info-row"><span class="label">요금</span><span class="value">${(route.payment || 0).toLocaleString()}원</span></div>
                    <div class="info-row"><span class="label">환승 횟수</span><span class="value">${route.transferCount}회</span></div>
                    <div class="info-row"><span class="label">권장 출발 시각</span><span class="value">${recommendedDepart}</span></div>
                </div>
                <div class="card"><h3>경로 구성</h3>${segmentsHtml}</div>
                ${boardingCardsHtml}`;
        }

        // ── 메인 조회 ─────────────────────────────────────────────────
        async function search() {
            const pathType    = parseInt(document.getElementById('type').value);
            const arrivalTime = document.getElementById('arrivalTime').value;
            const { startLat, startLon, endLat, endLon } = getCoords();
            const resultDiv   = document.getElementById('result');
            const btn         = document.getElementById('searchBtn');

            if (!arrivalTime) { resultDiv.innerHTML = '<p class="error">도착 희망 시각을 입력하세요.</p>'; return; }
            if (!startLat || !startLon || !endLat || !endLon) { resultDiv.innerHTML = '<p class="error">출발지/도착지 좌표를 입력하세요.</p>'; return; }

            resultDiv.innerHTML = '<p class="loading">조회 중...</p>';
            btn.disabled = true;

            try {
                if (pathType === 0) {
                    const routeData = await callRouteApi(0);
                    const mixedPaths = routeData?.result?.path?.filter(p => p.pathType === 3) || [];
                    if (!mixedPaths.length) {
                        resultDiv.innerHTML = `<p class="error">복합 경로를 찾을 수 없습니다.</p>
                            <details><summary style="cursor:pointer;font-size:13px;color:#64748b;">ODsay 응답 보기</summary>
                            <pre style="background:#f1f5f9;padding:12px;border-radius:6px;font-size:12px;overflow-x:auto;">${JSON.stringify(routeData, null, 2)}</pre></details>`;
                        return;
                    }
                    let allHtml = '';
                    for (let i = 0; i < mixedPaths.length; i++) {
                        const route = parseMixedRoute(mixedPaths[i]);
                        const segmentInfos = await getMixedBoardingInfo(route, arrivalTime);
                        allHtml += `<div class="route-section-header">경로 ${i + 1}</div>` + renderMixed(route, segmentInfos, arrivalTime);
                    }
                    resultDiv.innerHTML = allHtml;
                    return;
                }

                const routeData = await callRouteApi(pathType);
                if (!routeData?.result?.path?.length) {
                    resultDiv.innerHTML = `<p class="error">경로를 찾을 수 없습니다.</p>
                        <details open><summary style="cursor:pointer;font-size:13px;color:#64748b;">ODsay 응답 원본</summary>
                        <pre style="background:#f1f5f9;padding:12px;border-radius:6px;font-size:12px;overflow-x:auto;">${JSON.stringify(routeData, null, 2)}</pre></details>`;
                    return;
                }

                const paths = routeData.result.path.filter(p => p.pathType === pathType);
                if (!paths.length) { resultDiv.innerHTML = '<p class="error">해당 교통수단 경로가 없습니다.</p>'; return; }

                let allHtml = '';
                for (let i = 0; i < paths.length; i++) {
                    const routeHeader = `<div class="route-section-header">경로 ${i + 1}</div>`;
                    if (pathType === 1) {
                        const route = parseSubwayRoute(paths[i]);
                        const info  = await getSubwayBoardingInfo(route, arrivalTime);
                        allHtml += routeHeader + renderSubway(route, info);
                    } else {
                        const route = parseBusRoute(paths[i]);
                        const info  = await getBusBoardingInfo(route, arrivalTime);
                        allHtml += routeHeader + renderBus(route, info);
                    }
                }
                resultDiv.innerHTML = allHtml;
            } catch (e) {
                const debugBlock = e.debugData
                    ? `<details open><summary style="cursor:pointer;font-size:13px;color:#64748b;">API 응답 원본</summary><pre style="background:#f1f5f9;padding:12px;border-radius:6px;font-size:12px;overflow-x:auto;">${JSON.stringify(e.debugData, null, 2)}</pre></details>`
                    : '';
                resultDiv.innerHTML = `<p class="error">오류: ${e.message}</p>${debugBlock}`;
                console.error(e);
            } finally {
                btn.disabled = false;
            }
        }

        // ── 버스 도착 정보 단독 조회 ─────────────────────────────────
        async function fetchBusArrival() {
            const stId         = document.getElementById('stId').value.trim();
            const busRouteId   = document.getElementById('busRouteId').value.trim();
            const ord          = document.getElementById('ord').value.trim();
            const providerCode = document.getElementById('providerCode').value;
            const resultDiv    = document.getElementById('busArrivalResult');
            const btn          = document.getElementById('busArrivalBtn');

            if (!stId || !busRouteId) {
                resultDiv.innerHTML = '<p class="error">stId와 busRouteId를 입력하세요.</p>'; return;
            }

            resultDiv.innerHTML = '<p class="loading">조회 중...</p>';
            btn.disabled = true;

            try {
                const data = await callBusArrival(stId, busRouteId, ord || 0, parseInt(providerCode));
                resultDiv.innerHTML = renderBusArrivalInfo(data, parseInt(providerCode));
            } catch (e) {
                resultDiv.innerHTML = `<p class="error">오류: ${e.message}</p>`;
                console.error(e);
            } finally {
                btn.disabled = false;
            }
        }

        // BusArrivalInfo flat 객체 렌더링
        function renderBusArrivalInfo(data, providerCode) {
            if (!data || (!data.stId && !data.arrmsg1)) {
                return '<p class="error">도착 정보가 없습니다. stId / busRouteId / ord 값을 확인하세요.</p>';
            }

            // 결과 없음 케이스 (stId가 null이면 arrmsg1에 에러메시지)
            if (!data.stId) {
                return `<div class="bus-arrival-card"><p style="color:#dc2626;">${data.arrmsg1 || '결과 없음'}</p></div>`;
            }

            const regionLabel = providerCode === 2 ? '경기 BIS' : '서울 BIS';

            function busCard(arrMsg, remainSec) {
                if (!arrMsg || arrMsg.includes('운행 정보 없음')) {
                    return `<div class="bus-item" style="color:#94a3b8;font-size:13px;">정보 없음</div>`;
                }
                return `
                    <div class="bus-item">
                        <div class="info-row" style="margin-top:4px;">
                            <span class="label">도착 예정</span>
                            <span class="value" style="color:#2563eb;">${formatRemainTime(remainSec)}</span>
                        </div>
                        <div class="info-row"><span class="label">도착 메시지</span><span class="value">${arrMsg}</span></div>
                    </div>`;
            }

            return `
                <div class="bus-arrival-card">
                    <h3>정류소 / 노선 정보 <span style="font-size:12px;color:#64748b;font-weight:normal;">(${regionLabel})</span></h3>
                    <div class="info-row"><span class="label">정류소 ID</span><span class="value">${data.stId}</span></div>
                    <div class="info-row"><span class="label">정류소 이름</span><span class="value">${data.stNm || '-'}</span></div>
                    <div class="info-row"><span class="label">노선 ID</span><span class="value">${data.busRouteId}</span></div>
                    <div class="info-row"><span class="label">노선 번호</span><span class="value">${data.rtNm || '-'}번</span></div>
                </div>
                <div class="bus-arrival-card">
                    <h3>도착 예정 버스</h3>
                    <strong style="font-size:13px;">1번째 버스</strong>
                    ${busCard(data.arrmsg1, data.traTime1)}
                    <strong style="font-size:13px;margin-top:8px;display:block;">2번째 버스</strong>
                    ${busCard(data.arrmsg2, data.traTime2)}
                </div>`;
        }
        /*]]>*/
    </script>
</body>
</html>
