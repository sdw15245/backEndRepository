name: Deploy sweepMap Server to vultr

on:
  push:
    branches:
      - master
  pull_request:
    branches-ignore:
      - master
      
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: List Files in Current Directory
        run: ls -la

      - name: Copy docker-compose.yml to Vultr
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VULTR_SERVER_IP }}
          username: ${{ secrets.VULTR_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ./docker-compose.yml
          target: ~/sweepMap/

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest .

      - name: Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Create .env file on Vultr
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VULTR_SERVER_IP }}
          username: ${{ secrets.VULTR_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/sweepMap

      - name: Deploy to Vultr
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VULTR_SERVER_IP }}
          username: ${{ secrets.VULTR_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Docker 설치 확인
            if ! docker --version &>/dev/null; then
              sudo apt-get update
              sudo apt-get install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
            fi

            # Docker Compose 플러그인 설치 확인 (최신 방식)
            if ! docker compose version &>/dev/null; then
              sudo apt-get update
              sudo apt-get install -y docker-compose-plugin
            fi

            # 네트워크 생성 (없으면 생성, 있으면 무시)
            docker network create sweepMap-network || true

            cd ~/sweepMap

            # 기존 컨테이너 중지
            sudo docker compose down || true

            # DockerHub 로그인
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # 최신 이미지 pull
            sudo docker compose pull

            # 컨테이너 실행
            sudo docker compose up -d

            # 미사용 이미지 정리
            sudo docker image prune -f

            echo "Deployment completed successfully!"
